<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review: {{TITLE}}</title>
<style>
  /* OpenReview color system */
  :root {
    --or-bg: #fffdfa;
    --or-surface: #ffffff;
    --or-surface-alt: #f7f6f4;
    --or-sandy: #efece3;
    --or-red: #8c1b13;
    --or-red-dark: #7d1803;
    --or-blue: #3e6775;
    --or-blue-dark: #3f6978;
    --or-dark: #2c3a4a;
    --or-gray: #616161;
    --or-border: rgba(0,0,0,0.1);
    --or-badge-review: #fbb;
    --or-badge-meta: #fbf;
    --or-badge-decision: #bff;
    --or-badge-comment: #bbf;
    --or-badge-strength: #bfb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 16px; }
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 0.875rem;
    line-height: 1.5;
    color: var(--or-dark);
    background: var(--or-bg);
  }
  a { color: var(--or-blue); text-decoration: none; }
  a:hover { color: var(--or-blue-dark); text-decoration: underline; }
  h1, h2, h3 { color: var(--or-dark); }
  h4 { color: var(--or-red); font-weight: 700; }

  /* Navbar */
  .navbar {
    background: var(--or-red);
    border-bottom: 2px solid var(--or-red-dark);
    padding: 0;
    display: flex;
    align-items: center;
    min-height: 50px;
  }
  .navbar-inner {
    max-width: 1170px;
    margin: 0 auto;
    padding: 0 15px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .navbar-brand {
    font-size: 1.375rem;
    font-weight: 400;
    text-decoration: none;
    color: #b8b8b8;
    padding: 10px 0;
  }
  .navbar-brand strong { color: #fff; font-weight: 700; }
  .navbar-links { display: flex; gap: 1.5rem; }
  .navbar-links a {
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-size: 0.8125rem;
    font-weight: 500;
  }
  .navbar-links a:hover { color: #fff; text-decoration: none; }

  /* Banner */
  .banner {
    background: #ddd;
    border-bottom: 1px solid #d0d0d0;
    padding: 8px 0;
    font-size: 0.875rem;
    color: var(--or-gray);
  }
  .banner-inner { max-width: 1170px; margin: 0 auto; padding: 0 15px; }

  /* Container */
  .container { max-width: 1170px; margin: 0 auto; padding: 20px 15px 30px; }

  /* Forum title */
  .forum-title {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }
  .forum-title h2 {
    font-size: 2.125rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 2.5rem;
  }
  .forum-title .pdf-link a {
    color: var(--or-blue);
    font-size: 0.8125rem;
    font-weight: 600;
    padding: 4px 10px;
    border: 2px solid var(--or-blue-dark);
    display: inline-block;
    border-radius: 0;
  }
  .forum-title .pdf-link a:hover { background: var(--or-blue); color: #fff; text-decoration: none; }

  .forum-authors {
    font-style: italic;
    font-size: 1.25rem;
    color: var(--or-dark);
    margin-bottom: 0.5rem;
  }
  .forum-meta {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    font-size: 0.75rem;
    color: var(--or-gray);
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid #eee;
  }

  /* Note cards */
  .note {
    padding: 0.5rem;
    border: 1px solid #eee;
    border-radius: 0;
    margin-bottom: 0.75rem;
  }
  .note.depth-odd { background: var(--or-surface-alt); }
  .note.depth-even { background: var(--or-bg); }
  .note .heading { display: flex; justify-content: space-between; margin-bottom: 0.25rem; }
  .note .heading h4 { font-size: 1rem; font-weight: 700; color: var(--or-dark); line-height: 1.25rem; }
  .note .subheading {
    display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;
    font-size: 0.75rem; color: var(--or-gray); margin-bottom: 0.5rem;
  }
  .invitation {
    display: inline-block; padding: 0 4px; border-radius: 2px;
    font-size: 0.75rem; font-weight: 600; color: var(--or-dark);
  }
  .signatures { font-style: italic; }

  /* Field labels */
  .field-label { font-weight: 700; color: var(--or-red); font-size: 0.75rem; }
  .field-value { font-size: 0.75rem; line-height: 1.125rem; white-space: pre-wrap; }

  /* Issues */
  .issue-list { list-style: none; padding: 0; margin: 0.5rem 0; }
  .issue-item { padding: 0.5rem 0.75rem; margin-bottom: 0.25rem; border-left: 3px solid transparent; font-size: 0.8125rem; }
  .issue-major { border-left-color: #c0392b; background: #f8d7da; }
  .issue-minor { border-left-color: #e67e22; background: #fff3cd; }
  .issue-vminor { border-left-color: #7f8c8d; background: #e2e3e5; }
  .issue-item .issue-title { font-weight: 600; }
  .issue-item .issue-rec { font-size: 0.75rem; color: var(--or-gray); font-style: italic; margin-top: 0.125rem; }
  .strength-item { padding: 0.375rem 0.75rem; margin-bottom: 0.25rem; border-left: 3px solid #27ae60; background: #d4edda; font-size: 0.8125rem; }

  /* PDF embed */
  .pdf-section { margin-top: 1.5rem; }
  .pdf-section h3 { font-size: 0.875rem; color: var(--or-dark); margin-bottom: 0.5rem; }
  .pdf-container { border: 1px solid #eee; border-radius: 0; overflow: hidden; }
  .pdf-container iframe { width: 100%; height: 70vh; border: none; }

  /* Footer */
  .footer {
    border-top: 1px solid #ddd;
    background: var(--or-sandy);
    padding: 1.5rem;
    text-align: center;
    font-size: 0.8125rem;
    color: var(--or-gray);
  }
  .footer a { color: var(--or-dark); text-decoration: none; }

  /* Collapsible */
  .section-toggle {
    display: block; width: 100%; background: none; border: none; text-align: left;
    padding: 0.4rem 0; cursor: pointer; font-family: inherit;
    color: var(--or-dark); font-size: 0.75rem; font-weight: 700;
  }
  .section-toggle:hover { color: var(--or-blue); }
  .section-toggle .chevron { transition: transform 0.2s; font-size: 0.6rem; }
  .section-toggle.collapsed .chevron { transform: rotate(-90deg); }
  .section-content { overflow: hidden; transition: max-height 0.3s ease; }
  .section-content.collapsed { max-height: 0 !important; }

  @media (max-width: 768px) {
    .forum-title h2 { font-size: 1.5rem; line-height: 1.8rem; }
  }
</style>
<script>
function toggleSection(btn) {
  btn.classList.toggle('collapsed');
  btn.nextElementSibling.classList.toggle('collapsed');
}
</script>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-brand" href="https://parallelscience.org">PARALLEL<strong>REVIEW</strong></a>
    <div class="navbar-links">
      <a href="{{PAPER_PAGES_URL}}">Paper</a>
      <a href="review.pdf">Review PDF</a>
      <a href="{{GITHUB_URL}}">GitHub</a>
    </div>
  </div>
</nav>

<div class="banner">
  <div class="banner-inner">Open AI-powered peer review</div>
</div>

<div class="container">

  <!-- Paper Note (header) -->
  <div class="forum-note">
    <div class="forum-title">
      <h2>{{TITLE}}</h2>
      <div class="pdf-link"><a href="review.pdf">Review PDF</a></div>
    </div>
    <div class="forum-authors">{{AUTHOR}}</div>
    <div class="forum-meta">
      <span>{{DATE}}</span>
      <span>{{TIME}}</span>
      <span>Reviewed by Skepthical</span>
    </div>
  </div>

  <!-- Filter bar -->
  <div style="background:var(--or-surface-alt);border:1px solid #eee;padding:0.5rem 0.75rem;margin-bottom:0.75rem;font-size:0.75rem;color:var(--or-gray);">
    {{REVIEW_COUNT}} review section(s)
  </div>

  <!-- Review cards -->
  {{REVIEW_CARDS}}

  <!-- Review PDF embed -->
  <div class="pdf-section">
    <h3>Full Review Report</h3>
    <div class="pdf-container">
      <iframe src="review.pdf" title="Review PDF"></iframe>
    </div>
  </div>

</div>

<footer class="footer">
  <a href="https://parallelscience.org">ParallelScience</a>
  &middot; Reviewed by <a href="https://skepthical.com">Skepthical</a>
  &middot; Inspired by <a href="https://openreview.net">OpenReview</a>
</footer>

</body>
</html>
